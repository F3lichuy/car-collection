<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Garage — Colección de Coches</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c130c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-64.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Garage">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     TOKENS  — themeable via [data-theme]
     ============================================================ */
  :root{
    --bg:#14110f; --bg2:#1c1815; --card:#221d19; --card2:#2a241f;
    --line:#3a322b; --ink:#f3ece3; --ink-dim:#b6a99a; --ink-faint:#8a7d6f;
    --accent:#c9302c; --accent2:#e8b04b; --good:#76c66b; --shadow:rgba(0,0,0,.45);
    --radius:14px; --display:"Bebas Neue",Impact,sans-serif; --body:"Inter",system-ui,sans-serif;
  }
  [data-theme="retro"]{
    --bg:#1d1812; --bg2:#241d15; --card:#2b2318; --card2:#332a1d;
    --line:#48392618; --line:#473a26; --ink:#f1e4cd; --ink-dim:#c4ab83; --ink-faint:#94795a;
    --accent:#c0451f; --accent2:#d9a441; --good:#8aa14a; --shadow:rgba(0,0,0,.5);
  }
  [data-theme="dark"]{
    --bg:#0c0d0f; --bg2:#121316; --card:#16181c; --card2:#1d2025;
    --line:#2a2e35; --ink:#eef1f5; --ink-dim:#9aa3af; --ink-faint:#6b7280;
    --accent:#ff4d4d; --accent2:#37c0ff; --good:#48d597; --shadow:rgba(0,0,0,.6);
  }
  [data-theme="light"]{
    --bg:#f4f1ea; --bg2:#ebe6dc; --card:#ffffff; --card2:#f6f2ea;
    --line:#ddd5c7; --ink:#211d18; --ink-dim:#5c5448; --ink-faint:#8c8273;
    --accent:#b5341d; --accent2:#b8862a; --good:#4f8a3d; --shadow:rgba(120,110,90,.18);
  }
  [data-theme="rosso"]{
    --bg:#1a0d0c; --bg2:#240f0d; --card:#2b1311; --card2:#371613;
    --line:#4d211c; --ink:#fbeae6; --ink-dim:#d3a59c; --ink-faint:#a8746a;
    --accent:#ff2a1a; --accent2:#ffce4a; --good:#6fd06a; --shadow:rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, var(--bg2), var(--bg)) fixed;
    color:var(--ink); font-family:var(--body);
    -webkit-font-smoothing:antialiased; line-height:1.45; min-height:100vh;
  }
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px 80px}
  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(var(--bg), color-mix(in srgb,var(--bg) 80%, transparent));
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  }
  .topbar{max-width:1180px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px;flex:1;min-width:200px}
  .brand .wm{font-family:var(--display);font-size:34px;letter-spacing:1px;line-height:.9}
  .brand .wm b{color:var(--accent)}
  .brand .sub{color:var(--ink-faint);font-size:12px;text-transform:uppercase;letter-spacing:2px}
  .themes{display:flex;gap:6px;flex-wrap:wrap}
  .themes button{
    border:1px solid var(--line);background:var(--card);color:var(--ink-dim);
    border-radius:999px;padding:6px 11px;font-size:12px;display:flex;align-items:center;gap:6px;
  }
  .themes button.on{border-color:var(--accent);color:var(--ink)}
  .swatch{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid #0003}
  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:4px;max-width:1180px;margin:0 auto;padding:0 18px}
  .tabs button{
    background:none;border:none;border-bottom:2px solid transparent;
    color:var(--ink-faint);padding:12px 16px;font-size:14px;font-weight:600;letter-spacing:.3px;
  }
  .tabs button.on{color:var(--ink);border-color:var(--accent)}
  .tabs button:hover{color:var(--ink-dim)}
  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:20px 0 14px}
  .toolbar .grow{flex:1;min-width:120px}
  .btn{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;transition:.15s;
  }
  .btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
  select.ctrl,input.ctrl{
    background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:9px 12px;font-size:13px;
  }
  input.ctrl::placeholder{color:var(--ink-faint)}
  /* ---------- Chips / tag filters ---------- */
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 18px}
  .chip{
    border:1px solid var(--line);background:var(--card);color:var(--ink-dim);
    border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;transition:.15s;
  }
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip .x{opacity:.7;margin-left:4px}
  /* ---------- Car grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px}
  .car{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;display:flex;flex-direction:column;transition:.18s;position:relative;
    box-shadow:0 2px 0 var(--shadow);
  }
  .car:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent) 50%,var(--line))}
  .car .ph{aspect-ratio:16/10;background:var(--card2);position:relative;overflow:hidden}
  .car .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .car .ph .noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:32px}
  .car .rankbadge{
    position:absolute;top:8px;left:8px;background:var(--accent2);color:#1a1a1a;
    font-family:var(--display);font-size:18px;padding:1px 9px;border-radius:8px;letter-spacing:1px;
  }
  .car .avgbadge{
    position:absolute;top:8px;right:8px;background:#000a;color:#fff;backdrop-filter:blur(4px);
    border-radius:8px;padding:3px 8px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px;
  }
  .car .body{padding:12px 13px 13px;display:flex;flex-direction:column;gap:8px;flex:1}
  .car .nm{font-family:var(--display);font-size:21px;letter-spacing:.6px;line-height:.95}
  .car .meta{color:var(--ink-faint);font-size:12px;display:flex;gap:8px;flex-wrap:wrap;margin-top:-3px}
  .car .meta b{color:var(--accent2);font-weight:600}
  .car .tags{display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
       border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--ink-dim);background:var(--card2)}
  .car .bars{display:flex;flex-direction:column;gap:4px;margin-top:2px}
  .barrow{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--ink-dim)}
  .barrow .lab{width:62px;text-transform:capitalize;flex-shrink:0}
  .barrow .track{flex:1;height:8px;background:var(--card2);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .barrow .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;min-width:3px}
  .barrow .v{width:18px;text-align:right;color:var(--ink);font-weight:700}
  .car .acts{display:flex;gap:6px;margin-top:auto;padding-top:4px}
  .car .acts .btn.sm{flex:1;justify-content:center}
  /* ---------- Empty state ---------- */
  .empty{text-align:center;padding:70px 20px;color:var(--ink-faint)}
  .empty .big{font-size:46px;margin-bottom:6px}
  .empty h2{font-family:var(--display);font-size:30px;color:var(--ink);letter-spacing:1px;margin:6px 0}
  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:#000b;backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .scrim.show{display:flex}
  .modal{
    background:var(--card);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;
    box-shadow:0 30px 80px var(--shadow);overflow:hidden;animation:pop .18s ease;
  }
  .modal.wide{max-width:840px}
  @keyframes pop{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal .mh h3{margin:0;font-family:var(--display);font-size:24px;letter-spacing:.8px}
  .modal .mb{padding:18px 20px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow:auto}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .iconbtn{background:none;border:none;color:var(--ink-faint);font-size:22px;line-height:1;padding:4px}
  .iconbtn:hover{color:var(--ink)}
  .field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:5px;font-weight:600;letter-spacing:.3px}
  .field input,.field select,.field textarea{
    width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:10px 12px;font-size:14px;
  }
  .field textarea{resize:vertical;min-height:64px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .three{display:grid;grid-template-columns:1.4fr .8fr .8fr;gap:12px}
  .ratings{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .rate label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-dim);margin-bottom:4px;text-transform:capitalize;font-weight:600}
  .rate label .num{color:var(--accent2);font-family:var(--display);font-size:18px}
  .rate input[type=range]{width:100%;accent-color:var(--accent)}
  .dropimg{
    border:1.5px dashed var(--line);border-radius:12px;padding:18px;text-align:center;
    color:var(--ink-faint);font-size:13px;cursor:pointer;background:var(--bg2);
  }
  .dropimg:hover{border-color:var(--accent)}
  .preview{width:100%;max-height:170px;object-fit:cover;border-radius:10px;margin-top:8px;display:none}
  /* tag editor inside modal */
  .tagpick{display:flex;gap:6px;flex-wrap:wrap}
  .tagpick .tg{
    border:1px solid var(--line);background:var(--bg2);color:var(--ink-dim);
    border-radius:999px;padding:5px 11px;font-size:12px;font-weight:600;
  }
  .tagpick .tg.on{background:var(--accent2);border-color:var(--accent2);color:#1a1a1a}
  /* specs editor */
  .specsec{border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--bg2);display:flex;flex-direction:column;gap:10px}
  .specthumbs{display:flex;gap:6px;flex-wrap:wrap}
  .specthumbs img{width:54px;height:54px;object-fit:cover;border-radius:7px;border:1px solid var(--line)}
  /* ---------- Detail view ---------- */
  .detailhead{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px}
  .detailhead .big{font-family:var(--display);font-size:52px;letter-spacing:1px;line-height:.9}
  .detailgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
  /* ============================================================
     ACTIVITIES
     ============================================================ */
  .actnav{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 22px}
  .actnav button{
    border:1px solid var(--line);background:var(--card);color:var(--ink-dim);
    border-radius:12px;padding:14px 18px;font-weight:700;font-size:14px;letter-spacing:.3px;
    display:flex;flex-direction:column;gap:2px;align-items:flex-start;min-width:150px;transition:.15s;
  }
  .actnav button .ic{font-size:22px}
  .actnav button small{font-weight:500;color:var(--ink-faint);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .actnav button.on{border-color:var(--accent);color:var(--ink);transform:translateY(-2px)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .panel h3{font-family:var(--display);font-size:26px;letter-spacing:.8px;margin:0 0 4px}
  .panel .lead{color:var(--ink-dim);font-size:13px;margin:0 0 16px}
  /* five-car */
  .fivewrap{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .slot{
    aspect-ratio:1;border:1.5px dashed var(--line);border-radius:12px;background:var(--bg2);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;color:var(--ink-faint);
  }
  .slot.full{border-style:solid;cursor:pointer}
  .slot img{width:100%;height:100%;object-fit:cover}
  .slot .cap{position:absolute;left:0;right:0;bottom:0;background:#000a;color:#fff;font-size:11px;padding:4px 6px;font-weight:600}
  .slot .rm{position:absolute;top:4px;right:4px;background:#000a;color:#fff;border:none;border-radius:6px;width:22px;height:22px;font-size:14px}
  .slot .n{font-family:var(--display);font-size:30px;opacity:.5}
  .picker{max-height:430px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--bg2)}
  .pickrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer}
  .pickrow:hover{background:var(--card2)}
  .pickrow img,.pickrow .pn{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--card2);display:flex;align-items:center;justify-content:center;color:var(--ink-faint)}
  .pickrow .info{flex:1;min-width:0}
  .pickrow .info .t{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pickrow .info .s{font-size:11px;color:var(--ink-faint)}
  .pickrow.dis{opacity:.4;pointer-events:none}
  .budgetbar{display:flex;align-items:center;gap:10px;margin:12px 0;flex-wrap:wrap}
  .budgetbar .meter{flex:1;min-width:140px;height:8px;background:var(--card2);border-radius:99px;overflow:hidden}
  .budgetbar .meter .f{height:100%;background:linear-gradient(90deg,var(--good),var(--accent2));border-radius:99px}
  .budgetbar .meter .f.over{background:var(--accent)}
  .combolist{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .comboitem{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--bg2)}
  .comboitem .t{flex:1;font-weight:600;font-size:13px}
  .comboitem .mini{display:flex;gap:3px}
  .comboitem .mini img,.comboitem .mini span{width:26px;height:26px;border-radius:5px;object-fit:cover;background:var(--card2)}
  /* top100 */
  .t100{display:flex;flex-direction:column;gap:6px}
  .t100row{
    display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;
  }
  .t100row .pos{font-family:var(--display);font-size:26px;width:48px;text-align:center;color:var(--accent2);flex-shrink:0}
  .t100row .pos input{width:46px;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:4px;text-align:center;font-family:var(--display);font-size:18px}
  .t100row img,.t100row .pn{width:46px;height:46px;border-radius:8px;object-fit:cover;background:var(--card2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--ink-faint)}
  .t100row .info{flex:1;min-width:0}
  .t100row .info .t{font-weight:700;font-size:14px}
  .t100row .info .s{font-size:11px;color:var(--ink-faint)}
  .t100row .medal{font-size:22px}
  .unranked{margin-top:18px}
  .unranked h4{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-faint);margin:0 0 8px}
  .pool{display:flex;gap:8px;flex-wrap:wrap}
  .poolcar{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 6px;background:var(--bg2);font-size:12px;font-weight:600;cursor:pointer}
  .poolcar:hover{border-color:var(--accent2)}
  .poolcar img,.poolcar .pn{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--card2)}
  .poolcar.sel{outline:2px solid var(--accent2);border-color:var(--accent2)}
  .tierrow{display:flex;gap:10px;align-items:stretch;margin-bottom:8px}
  .tierlabel{width:54px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:26px;color:#1a1a1a;cursor:pointer}
  .tierdrop{flex:1;min-height:54px;border:1px dashed var(--line);border-radius:10px;background:var(--bg2);display:flex;gap:6px;flex-wrap:wrap;padding:7px;align-content:flex-start}
  .tierdrop.dragover{border-color:var(--accent2);background:color-mix(in srgb,var(--accent2) 14%,var(--bg2))}
  .poolcar[draggable]{cursor:grab}
  /* bracket display */
  .bracket{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
  .bcol{min-width:188px;display:flex;flex-direction:column;gap:10px}
  .bcol-h{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-faint);text-align:center}
  .bmatch{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg2)}
  .bm-row{display:flex;align-items:center;gap:7px;padding:6px 8px;font-size:12px;border-bottom:1px solid var(--line)}
  .bm-row:last-child{border-bottom:none}
  .bm-row img,.bm-row .pn{width:30px;height:24px;border-radius:4px;object-fit:cover;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
  .bm-row .bm-nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bm-row.win{background:color-mix(in srgb,var(--good) 22%,transparent);font-weight:700}
  .bm-row.lose{opacity:.5;text-decoration:line-through}
  .bm-row.bye{justify-content:center;color:var(--ink-faint);font-style:italic}
  .bm-ck{color:var(--good);font-weight:800}
  /* carousel */
  .carousel{position:relative;border-radius:12px;overflow:hidden;background:var(--card2)}
  .carousel>img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block}
  .cnav{position:absolute;top:50%;transform:translateY(-50%);background:#000a;color:#fff;border:none;width:42px;height:56px;font-size:26px;cursor:pointer;z-index:2}
  .cnav.prev{left:0;border-radius:0 10px 10px 0}
  .cnav.next{right:0;border-radius:10px 0 0 10px}
  .cnav:hover{background:#000d}
  .cdots{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:5px;justify-content:center;z-index:2}
  .cdots span{width:8px;height:8px;border-radius:50%;background:#fff7;cursor:pointer}
  .cdots span.on{background:#fff}
  /* tournament */
  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin:10px 0 18px}
  .vscard{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--bg2);cursor:pointer;transition:.15s}
  .vscard:hover{border-color:var(--accent);transform:translateY(-3px)}
  .vscard .ph{aspect-ratio:16/10;background:var(--card2);position:relative}
  .vscard .ph img{width:100%;height:100%;object-fit:cover}
  .vscard .ph .noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--ink-faint)}
  .vscard .cap{padding:10px 12px}
  .vscard .cap .t{font-family:var(--display);font-size:20px;letter-spacing:.5px}
  .vscard .cap .s{font-size:11px;color:var(--ink-faint)}
  .vsmid{font-family:var(--display);font-size:30px;color:var(--accent)}
  .tourbar{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:6px}

(function(){

  var kill=function(){ if(ov&&ov.parentNode){ ov.parentNode.removeChild(ov); ov=null; } };

    P(/^necesitas: (.+)$/, function(m){ return "need: "+m[1]; }),
    P(/^Agregar (.+)$/, function(m){ return "Add "+m[1]; }),
    P(/^por @/, function(m){ return m.input.replace(/^por @/,"by @"); }),
    P(/^de @(.+)$/, function(m){ return "from @"+m[1]; }),
    P(/^Elige qué specs (.*)añadir a tu coche:$/, function(m){ return "Choose which specs "+m[1].replace(/^de @/,"from @")+"to add to your car:"; }),
    P(/^¿Borrar "(.+)" del marketplace\? \(no afecta los garajes de la gente\)$/, function(m){ return "Delete \""+m[1]+"\" from the marketplace? (doesn't affect people's garages)"; }),
    P(/^¿Quitar la versión (.+) de (.+) del marketplace\?$/, function(m){ return "Remove version "+m[1]+" from "+m[2]+" in the marketplace?"; }),
    P(/^¿Quitar la categoría "(.+)"\? Los coches conservarán otras etiquetas\.$/, function(m){ return "Remove the category \""+m[1]+"\"? Cars will keep their other tags."; })
  ];

  function translateCore(s){
    if(Object.prototype.hasOwnProperty.call(DICT,s)) return DICT[s];
    for(var i=0;i<PAT.length;i++){ var r=PAT[i][0].exec(s); if(r) return PAT[i][1](r); }
    return s;
  }
  function tr(raw){
    if(LANG!=="en"||typeof raw!=="string"||!raw) return raw;
    var m=raw.match(/^(\s*)([\s\S]*?)(\s*)$/);
    var core=m[2]; if(!core) return raw;
    var t=translateCore(core);

  }

  function walk(node){
    if(node.nodeType===3){ var t=node.nodeValue; if(t&&/\S/.test(t)){ var nt=tr(t); if(nt!==t) node.nodeValue=nt; } return; }
    if(node.nodeType!==1) return;
    var tag=node.nodeName;
    if(tag==="SCRIPT"||tag==="STYLE") return;
    if(node.getAttribute){
      var ph=node.getAttribute("placeholder"); if(ph){ var np=tr(ph); if(np!==ph) node.setAttribute("placeholder",np); }
      var ti=node.getAttribute("title"); if(ti){ var nti=tr(ti); if(nti!==ti) node.setAttribute("title",nti); }
    }
    if(tag==="TEXTAREA") return;  // no traducir contenido del usuario
    for(var c=node.firstChild;c;c=c.nextSibling) walk(c);
  }

  // override confirm/prompt para traducir sus mensajes
  var _c=window.confirm.bind(window); window.confirm=function(msg){ return _c(tr(msg)); };
  var _p=window.prompt.bind(window);  window.prompt =function(msg,d){ return _p(tr(msg),d); };

  function wireLang(){
    var btn=document.getElementById("langToggle");
    if(btn){
      btn.textContent = (LANG==="en") ? "🌐 ES" : "🌐 EN";
      btn.onclick=function(){ try{ localStorage.setItem("mg-lang", LANG==="en"?"es":"en"); }catch(e){} location.reload(); };
    }
  }

  if(LANG==="en"){
    try{ document.documentElement.lang="en"; }catch(e){}
    document.title="My Garage — Car Collection";
    walk(document.body);                 // traduce lo que ya está en el DOM
    var mo=new MutationObserver(function(muts){
      for(var i=0;i<muts.length;i++){ var a=muts[i].addedNodes; for(var j=0;j<a.length;j++) walk(a[j]); }
    });
    mo.observe(document.body,{childList:true,subtree:true});
  }
  wireLang();
})();

function downscale(file,maxW,cb){
  const rd=new FileReader();
  rd.onload=ev=>{const img=new Image();
    img.onload=()=>{const sc=Math.min(1,maxW/img.width);const cv=document.createElement("canvas");
      cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);cb(cv.toDataURL("image/jpeg",0.82));};
    img.src=ev.target.result;};
  rd.readAsDataURL(file);
}
function downscaleBlob(file,maxW,cb){
  const rd=new FileReader();
  rd.onload=ev=>{const img=new Image();
    img.onload=()=>{const sc=Math.min(1,maxW/img.width);const cv=document.createElement("canvas");

}

function renderTagFilters(){
  const el=$("#tagFilters");
  const used=new Set(); cars.forEach(c=>(c.tags||[]).forEach(t=>used.add(t)));
  const list=[...new Set([...categories,...used])];
  // reflejar filtros activos en el botón
  const fb=$("#filterBtn");
  if(fb){ const n=activeTagFilters.size; fb.innerHTML="🔖 Filtrar"+(n?` (${n})`:""); fb.classList.toggle("primary",!!n); fb.classList.toggle("ghost",!n); }
  if(!list.length){ el.innerHTML=""; el.style.display="none"; tagPanelOpen=false; return; }
  el.style.display=tagPanelOpen?"flex":"none";
  if(!tagPanelOpen){ el.innerHTML=""; return; }
  const clearBtn=activeTagFilters.size?`<button class="chip" data-clear="1" style="opacity:.8">Limpiar ✕</button>`:"";
  el.innerHTML=list.map(t=>
    `<button class="chip ${activeTagFilters.has(t)?'on':''}" data-tag="${t}">${t}${activeTagFilters.has(t)?' <span class="x">×</span>':''}</button>`).join("")+clearBtn;
  el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    if(c.dataset.clear){ activeTagFilters.clear(); renderGarage(); return; }
    const t=c.dataset.tag;
    activeTagFilters.has(t)?activeTagFilters.delete(t):activeTagFilters.add(t);
    renderGarage();
  });
}
function toggleTagPanel(){ tagPanelOpen=!tagPanelOpen; renderTagFilters(); }
function getFilteredSorted(){
  const q=($("#search").value||"").toLowerCase().trim();
  let list=cars.filter(c=>{
    const hay=`${c.brand||""} ${c.name||""} ${c.year||""}`.toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(activeTagFilters.size){
      const tags=new Set(c.tags||[]);
      for(const t of activeTagFilters) if(!tags.has(t)) return false;
    }
    return true;
  });
  const s=$("#sort").value;
  const num=v=>v==null||v===""?-Infinity:Number(v);
  list.sort((a,b)=>{
    switch(s){
      case"name":return (a.name||"").localeCompare(b.name||"");
      case"priceHi":return num(b.price)-num(a.price);
      case"priceLo":return (a.price==null?Infinity:num(a.price))-(b.price==null?Infinity:num(b.price));
      case"recent":return (b.created||0)-(a.created||0);
      case"estilo":case"diseno":case"historia":case"rendimiento":case"exclusividad":case"deseo":
        return (b.ratings?.[s]||0)-(a.ratings?.[s]||0);
      default:return avg(b)-avg(a);
    }
  });
  return list;
}
function renderGarage(){
  renderTagFilters();
  const list=getFilteredSorted();
  $("#count").textContent=`${list.length} ${list.length===1?'coche':'coches'}`+

}

function saveCar(id){
  const name=$("#f-name").value.trim();
  if(!name){toast("Falta el nombre del coche");return;}
  const ratings={}; PARAMS.forEach(p=>ratings[p]=Number($("#r-"+p).value));
  const priceVal=$("#f-price").value;
  // limpia versiones totalmente vacías
  let specs=editSpecs.filter(s=>(s.title&&s.title.trim())||(s.details&&s.details.trim())||(s.color&&s.color.trim())||(s.images&&s.images.length));
  // portada: la imagen elegida, o la primera disponible
  const allImg=[]; specs.forEach(s=>(s.images||[]).forEach(im=>allImg.push(im)));
  let cover=editCoverImg; if(!cover || !allImg.includes(cover)) cover=allImg[0]||"";
  // color = el de la versión que tiene la portada (o el de la primera versión con color)
  let color=""; for(const s of specs){ if((s.images||[]).includes(cover)){ color=s.color||""; break; } }
  if(!color){ const sc=specs.find(s=>s.color&&s.color.trim()); if(sc)color=sc.color; }
  const data={
    name, brand:$("#f-brand").value.trim(), year:$("#f-year").value.trim(),
    price: priceVal===""?null:Number(priceVal), currency:$("#f-curr").value,
    image:cover, color,
    notes:$("#f-notes").value.trim(),
    ratings, specs, tags:[...editTags]
  };
  if(id){const c=cars.find(x=>x.id===id);Object.assign(c,data);}
  else{cars.push({id:uid(),created:Date.now(),...data});}
  upsertCatalog(data);
  saveAll(); closeAll(); renderGarage(); toast(id?"Coche actualizado":"Coche añadido");
}
function delCar(id){
  if(!confirm("¿Eliminar este coche de tu garage?"))return;
  cars=cars.filter(c=>c.id!==id);

  saveAll(); closeAll(); renderGarage();
}

function doImport(file){
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      // Accept three shapes safely:
      //  A) a bare array of cars  (your original + current export)
      //  B) {cars:[...]}          (a full backup blob)
      //  C) {cars:[...], irlCars:[...], categories, combos, top100}
      let list, blob=null;
      if(Array.isArray(parsed)) list=parsed;
      else if(parsed && Array.isArray(parsed.cars)){ list=parsed.cars; blob=parsed; }
      else throw new Error("shape");
      const merge = window.__importMode==="merge";
      const incoming=list.map(normalizeCar);
      // antiguo "Tipo" → tag
      incoming.forEach(c=>{ if(c.type && !c.tags.includes(c.type)) c.tags.unshift(c.type); });
      // pull unknown tags into the category list so chips show up
      incoming.forEach(c=>c.tags.forEach(t=>{if(!categories.includes(t))categories.push(t);}));
      if(merge){
        const seen=new Set(cars.map(c=>c.id));
        incoming.forEach(c=>{ while(seen.has(c.id))c.id=uid(); seen.add(c.id); cars.push(c); });
      }else{
        cars=incoming;
      }
      // if it was a full backup, optionally bring the rest along
      if(blob){
        if(Array.isArray(blob.irlCars)) irlCars=blob.irlCars.map(normalizeIrl);
        if(blob.categories?.length) blob.categories.forEach(t=>{if(!categories.includes(t))categories.push(t);});
        if(Array.isArray(blob.combos)) combos=merge?combos.concat(blob.combos):blob.combos;
        if(blob.top100&&!merge) top100=blob.top100;
        if(blob.tierMap&&!merge) tierMap=blob.tierMap;
      }
      saveAll(); renderGarage();
      toast(`${incoming.length} coches importados${merge?" (añadidos)":""}`);
    }catch(err){ toast("Archivo no válido"); }
    window.__importMode=null;
  };
  rd.readAsText(file);
}

function brkStart(){
  const ids=cars.map(c=>c.id).sort(()=>Math.random()-0.5);

function renderBracket(){
  const v=$("#actView");
  if(cars.length<2){v.innerHTML=`<div class="panel"><h3>Torneo</h3><p class="lead">Necesitas al menos 2 coches.</p></div>`;return;}

  if(brk.round.length>1 && brk.match+1>=brk.round.length){
    if(brk.match<brk.round.length){brk.next.push(brk.round[brk.match]);
      brk.history.push({size:brk.round.length,a:brk.round[brk.match],b:null,winner:brk.round[brk.match],bye:true});}
    brk.round=brk.next;brk.next=[];brk.match=0;brk.roundNo++;
  }
  if(brk.round.length<=1)return brkPodium(v);
  const a=cars.find(x=>x.id===brk.round[brk.match]);
  const b=cars.find(x=>x.id===brk.round[brk.match+1]);
  const totalMatches=Math.floor(brk.round.length/2);
  const roundName=brk.round.length<=2?"Final":brk.round.length<=4?"Semifinal":brk.round.length<=8?"Cuartos":"Ronda "+brk.roundNo;

  v.innerHTML=`<div class="panel"><h3>Torneo · ${roundName}</h3>
    <p class="lead">Partido ${Math.floor(brk.match/2)+1} de ${totalMatches} · ${brk.round.length} coches en esta ronda</p>
    <div class="vs">${card(a,0)}<div class="vsmid">VS</div>${card(b,1)}</div>
    <button class="btn ghost sm" onclick="brk=null;renderBracket()">✕ Reiniciar</button></div>`;
}
function brkPick(i){
  const winner=i===0?brk.round[brk.match]:brk.round[brk.match+1];
  const loser=i===0?brk.round[brk.match+1]:brk.round[brk.match];
  brk.history.push({size:brk.round.length,a:brk.round[brk.match],b:brk.round[brk.match+1],winner});
  brk.podium.push({id:loser,round:brk.round.length});
  brk.next.push(winner);
  brk.match+=2;
  renderBracket();
}

  const cols=sizes.map(s=>`<div class="bcol"><div class="bcol-h">${roundLabel(s)}</div>${brk.history.filter(h=>h.size===s).map(matchCard).join("")}</div>`).join("");
  const cc=cars.find(x=>x.id===champ);const cim=cc?firstImg(cc):null;

/* ---------- TOP 100 ---------- */
function renderTop100(){
  const v=$("#actView");
  const ranked=cars.filter(c=>top100[c.id]).sort((a,b)=>top100[a.id]-top100[b.id]);
  const unranked=cars.filter(c=>!top100[c.id]);
  const medal=p=>p===1?"🥇":p===2?"🥈":p===3?"🥉":"";
  v.innerHTML=`<div class="panel">
    <h3>Top 100</h3>
    <p class="lead">Tu ranking definitivo. Asigna una posición a cada coche (1 = el mejor). Edita el número para reordenar.</p>

      <button class="btn sm ghost" onclick="clearTop()" style="color:var(--accent)">Vaciar ranking</button>
    </div>
    <div class="t100">
      ${ranked.length?ranked.map(c=>{
        const p=top100[c.id]; const img=firstImg(c);
        return `<div class="t100row">
          <span class="pos"><input type="number" min="1" max="100" value="${p}" onchange="setTop('${c.id}',this.value)"></span>
          <span class="medal">${medal(p)}</span>
          ${img?`<img src="${img}">`:`<div class="pn">🚗</div>`}
          <div class="info"><div class="t">${c.brand||""} ${c.name||""}</div>
            <div class="s">${c.year||""} · ★${avg(c).toFixed(1)} · ${money(c)}</div></div>
          <button class="btn sm ghost" style="color:var(--accent)" onclick="setTop('${c.id}','')">Quitar</button>
        </div>`;
      }).join(""):'<p style="color:var(--ink-faint)">Aún no has rankeado ningún coche. Toca uno abajo o usa autollenar.</p>'}
    </div>
    ${unranked.length?`<div class="unranked"><h4>Sin posición — toca para añadir al final</h4>
      <div class="pool">${unranked.map(c=>{const im=firstImg(c);return `<div class="poolcar" onclick="addToTop('${c.id}')">
        ${im?`<img src="${im}">`:`<div class="pn">🚗</div>`}${c.brand||""} ${c.name||""}</div>`;}).join("")}</div></div>`:""}
  </div>`;

function setTop(id,val){
  if(val===""||val==null){delete top100[id];}
  else top100[id]=Math.max(1,Math.min(100,Number(val)));
  saveAll(); renderTop100();
}
function addToTop(id){
  const max=Math.max(0,...Object.values(top100));
  top100[id]=max+1; saveAll(); renderTop100();
}
function autoFillTop(){
  const sorted=[...cars].sort((a,b)=>avg(b)-avg(a));
  top100={}; sorted.forEach((c,i)=>{if(i<100)top100[c.id]=i+1;});
  saveAll(); renderTop100(); toast("Rankeado por promedio");
}
function clearTop(){if(confirm("¿Vaciar todo el Top 100?")){top100={};saveAll();renderTop100();}}
/* ---------- DUELOS (tournament) ---------- */
function renderTourney(){
  const v=$("#actView");
  if(cars.length<2){
    v.innerHTML=`<div class="panel"><h3>Duelos</h3><p class="lead">Necesitas al menos 2 coches para jugar.</p></div>`;
    return;
  }
  if(!tourState){
    v.innerHTML=`<div class="panel"><h3>Duelos — rey de la colina</h3>
      <p class="lead">Elige tu preferido entre dos. El ganador se queda y enfrenta al siguiente coche, uno por uno, hasta tu favorito definitivo.</p>
      <button class="btn primary" onclick="startTour()">▶ Empezar</button></div>`;
    return;
  }
  if(!tourState.queue.length){
    const winner=cars.find(c=>c.id===tourState.champion);
    const img=winner?firstImg(winner):null;
    v.innerHTML=`<div class="panel" style="text-align:center">
      <h3>🏆 Tu favorito</h3>
      <div style="max-width:340px;margin:14px auto">
        <div class="vscard" style="cursor:default">
          <div class="ph">${img?`<img src="${img}">`:`<div class="noimg">🚗</div>`}</div>
          <div class="cap"><div class="t">${winner.brand||""} ${winner.name||""}</div>
            <div class="s">${winner.year||""} · ★${avg(winner).toFixed(1)}</div></div>
        </div>
      </div>
      <button class="btn primary" onclick="startTour()">↻ Jugar otra vez</button></div>`;
    tourState=null; return;
  }
  const a=cars.find(c=>c.id===tourState.champion);
  const b=cars.find(c=>c.id===tourState.queue[0]);
  const pct=Math.round(tourState.duel/tourState.total*100);
  const card=(c,which,champ)=>{const img=firstImg(c);return `<div class="vscard" onclick="tourPick('${which}')" style="position:relative">
    ${champ?`<div style="position:absolute;top:8px;left:8px;z-index:3;background:var(--good);color:#0a0a0a;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:6px">★ Campeón</div>`:''}
    <div class="ph">${img?`<img src="${img}">`:`<div class="noimg">🚗</div>`}</div>
    <div class="cap"><div class="t">${c.brand||""} ${c.name||""}</div><div class="s">${c.year||""} · ★${avg(c).toFixed(1)}</div></div></div>`;};
  v.innerHTML=`<div class="panel"><h3>¿Cuál prefieres? · Duelo ${tourState.duel+1} de ${tourState.total}</h3>
    <div class="tourbar"><div class="f" style="width:${pct}%"></div></div>
    <div class="vs">${card(a,'a',true)}<div class="vsmid">VS</div>${card(b,'b',false)}</div></div>`;
}
function startTour(){
  const ids=cars.map(c=>c.id).sort(()=>Math.random()-0.5);
  tourState={champion:ids[0], queue:ids.slice(1), total:ids.length-1, duel:0};
  renderTourney();
}
function tourPick(which){
  if(which==='b') tourState.champion=tourState.queue[0];
  tourState.queue.shift();
  tourState.duel++;
  renderTourney();
}

function showTab(t){
  if(t!=="home"){ if(typeof stopStoryTimer==="function")stopStoryTimer(); if(typeof stopHeroRotator==="function")stopHeroRotator(); }
  ["home","garage","irl","activities","market","battle","historia","discover"].forEach(x=>{const el=$("#tab-"+x); if(el) el.style.display=x===t?"":"none";});
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
  try{ window.scrollTo({top:0,behavior:"smooth"}); }catch(e){}
  if(t==="home")renderHome();
  else if(t==="activities")renderAct();
  else if(t==="irl")renderIrl();
  else if(t==="market")renderMarketTab();
  else if(t==="battle")renderBattle();
  else if(t==="historia")renderHistoria();
  else if(t==="discover")renderDiscover();
}
function closeAll(){document.querySelectorAll(".scrim").forEach(s=>s.classList.remove("show"));}
function wire(){
  document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
  document.querySelectorAll("#actnav button").forEach(b=>b.onclick=()=>{currentAct=b.dataset.act;tourState=null;renderAct();});
  $("#search").oninput=renderGarage;

  $("#irlSort").onchange=renderIrl;
  $("#irlAddBtn").onclick=()=>openIrlEdit();
  $("#addBtn").onclick=()=>openEdit();
  $("#catBtn").onclick=openCats;
  $("#filterBtn").onclick=toggleTagPanel;
  $("#exportBtn").onclick=doExport;
  $("#backupBtn").onclick=doBackup;
  $("#importBtn").onclick=()=>{
    if(cars.length){
      openImportChoice();
    }else{
      window.__importMode="replace"; $("#importFile").click();
    }
  };
  $("#importFile").onchange=e=>{if(e.target.files[0])doImport(e.target.files[0]);e.target.value="";};
  document.querySelectorAll(".scrim").forEach(s=>s.onclick=e=>{if(e.target===s)closeAll();});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeAll();});
}

async function routeAndLoad(){
  const m=location.hash.match(/^#\/?u\/(.+)$/i);
  if(m && supa){ return openUserGarage(decodeURIComponent(m[1])); }
  viewing=null; readOnly=false;
  if(supa){ try{ const {data}=await supa.auth.getSession(); session=data.session||null; }catch(e){ session=null; } }
  if(session){ await loadMyGarage(); } else { await loadAll(); }
  await loadSharedCats();   // trae las categorías que crearon otros usuarios
  applyAfterLoad();
  if(session && !myProfile) promptUsername();
}
async function loadMyGarage(){
  myProfile=null;
  try{ const {data}=await supa.from("profiles").select("*").eq("user_id",session.user.id).maybeSingle(); myProfile=data||null; }catch(e){}
  let cloud=null;
  try{ const {data}=await supa.from("garages").select("data").eq("user_id",session.user.id).maybeSingle(); cloud=data?data.data:null; }catch(e){}
  if(cloud && (cloud.cars||cloud.irlCars)){ loadFromBlob(cloud); }
  else { await loadAll(); await saveAll(); }   // primera vez: sube tu garage local a la nube
  seedCatalog();   // publica tus coches en el marketplace
}
async function openUserGarage(username){
  readOnly=true; viewing={username};
  let prof=null;
  try{ const {data}=await supa.from("profiles").select("*").ilike("username",username).maybeSingle(); prof=data||null; }catch(e){}
  if(!prof){ loadFromBlob({}); applyAfterLoad(); toast("Ese garage no existe o es privado"); return; }
  viewing.username=prof.username; viewing.userId=prof.user_id;
  if(session && prof.user_id!==session.user.id){ try{ viewing.isFriend=await isFollowing(prof.user_id); }catch(e){} }
  let cloud=null;
  try{ const {data}=await supa.from("garages").select("data").eq("user_id",prof.user_id).maybeSingle(); cloud=data?data.data:null; }catch(e){}
  loadFromBlob(cloud||{});
  applyAfterLoad();
  showTab("garage");
}
function goHome(){ location.hash=""; viewing=null; readOnly=false; routeAndLoad(); }

/* ---- marketplace (catálogo de coches) ---- */
let mkData=[], mkTimer=null;
async function upsertCatalog(c){
  if(!supa||!session||readOnly)return;
  if(!(c.brand||c.name))return;
  const key=((c.brand||"")+"|"+(c.name||"")+"|"+(c.year||"")).toLowerCase().trim();
  const cover=firstImg(c)||"";
  const isData=u=>typeof u==="string"&&u.startsWith("data:");
  // variantes = cada versión/spec con TODAS sus fotos, color y detalles
  // (para que el marketplace ofrezca todos los colores y al añadir lleguen todas las fotos)
  const local=[];
  (c.specs||[]).forEach(s=>{
    const imgs=(s.images||[]).filter(im=>im&&!isData(im));   // solo enlaces (no base64)
    if(imgs.length){ local.push({color:(s.color||""),image:imgs[0],images:imgs.slice(0,12),title:(s.title||""),details:(s.details||"")}); }
  });
  if(!local.length && cover && !isData(cover)){ local.push({color:(c.color||""),image:cover,images:[cover],title:"",details:""}); }
  try{
    let variants=[];
    try{ const {data}=await supa.from("catalog").select("variants").eq("key",key).maybeSingle(); if(data&&Array.isArray(data.variants)) variants=data.variants; }catch(e){}
    // normaliza: nunca base64, y asegura arreglo images en cada variante
    variants=variants.filter(v=>v&&v.image&&!isData(v.image))
      .map(v=>({...v, images:(Array.isArray(v.images)&&v.images.length?v.images:[v.image]).filter(im=>im&&!isData(im))}));
    local.forEach(v=>{
      const ex=variants.find(x=>x.image===v.image);
      if(ex){ ex.images=v.images; ex.details=v.details||ex.details||""; ex.title=ex.title||v.title; ex.color=ex.color||v.color; }
      else variants.push(v);   // versión nueva con todas sus fotos + detalles
    });
    variants=variants.slice(0,24);
    const coverOut=isData(cover)?(variants[0]&&variants[0].image)||"":cover;
    await supa.from("catalog").upsert({key,brand:c.brand||"",name:c.name||"",year:c.year||"",image:coverOut,variants,added_by:session.user.id},{onConflict:"key"});
  }catch(e){}
}

let catPickCtx=null;
function catVariants(e){
  if(Array.isArray(e.variants)&&e.variants.length) return e.variants.map(v=>({
    color:v.color||"", image:v.image||(Array.isArray(v.images)&&v.images[0])||"",
    images:(Array.isArray(v.images)&&v.images.length)?v.images:(v.image?[v.image]:[]),
    title:v.title||"", details:v.details||""
  }));
  if(Array.isArray(e.images)&&e.images.length) return e.images.map(im=>({color:"",image:im,images:[im],title:"",details:""}));
  if(e.image) return [{color:"",image:e.image,images:[e.image],title:"",details:""}];
  return [];
}
async function addFromCatalog(i){
  const e=mkData[i]; if(!e)return;
  if(!session){ toast("Inicia sesión para guardar coches"); return openAuth('login'); }
  let full=e;
  try{ const {data}=await supa.from("catalog").select("variants,images,image,added_by").eq("key",e.key).maybeSingle(); if(data) full={...e, variants:data.variants, images:data.images, image:data.image||e.image, added_by:data.added_by}; }catch(err){}
  let variants=catVariants(full);
  // Traer TODAS las fotos directo del garage de quien lo publicó
  // (el catálogo pudo haber quedado con solo 1 foto si se publicó con la versión vieja)
  try{
    if(full.added_by){
      const {data:g}=await supa.from("garages").select("data").eq("user_id",full.added_by).maybeSingle();
      const ownerCars=(g&&g.data&&Array.isArray(g.data.cars))?g.data.cars:null;
      if(ownerCars){
        const base={brand:e.brand||"",name:e.name||""};
        const src=ownerCars.find(c=>sameCar(c,base)&&String(c.year||"")===String(e.year||""))
               || ownerCars.find(c=>sameCar(c,base));
        if(src && Array.isArray(src.specs) && src.specs.length){
          const rich=[];
          src.specs.forEach(s=>{ const imgs=(s.images||[]).filter(Boolean); if(imgs.length) rich.push({color:s.color||"",image:imgs[0],images:imgs.slice(),title:s.title||"",details:s.details||""}); });
          if(rich.length) variants=rich;   // usa las fotos completas del dueño
        }
      }
    }
  }catch(err){}
  catPickCtx={e:full, variants:variants};
  renderCatPicker();
  $("#promptScrim").classList.add("show");
}
function renderCatPicker(){
  if(!catPickCtx)return; const e=catPickCtx.e, variants=catPickCtx.variants;
  $("#promptModal").innerHTML=`<div class="mh"><h3>Agregar ${esc(e.brand||"")} ${esc(e.name||"")}</h3><button class="iconbtn" onclick="closeAll()">×</button></div>
    <div class="mb">
      <p style="color:var(--ink-dim);font-size:13px;margin:0">${variants.length?"Elige la versión / color que quieres. Si ya tienes este coche, se añade como otra versión.":"Este coche aún no tiene fotos; se añadirá sin imagen (puedes ponerle la tuya después)."}${adminUnlocked?' <b style="color:var(--accent2)">· Admin: 🗑 quita versiones.</b>':''}</p>
      <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr))">
        ${variants.map((v,k)=>`<div class="car">

            <div class="acts"><button class="btn primary sm" style="flex:1;justify-content:center" onclick="pickCatalog(${k})">Elegir</button>
              ${adminUnlocked?`<button class="btn ghost sm" style="color:var(--accent)" title="Quitar versión del marketplace" onclick="adminRemoveVariant(${k})">🗑</button>`:''}</div>
          </div>
        </div>`).join("")}
        <div class="car" style="cursor:pointer" onclick="pickCatalog(-1)"><div class="ph"><div class="noimg" style="flex-direction:column">🚗<span style="font-size:11px">Sin imagen</span></div></div></div>
      </div>
    </div>`;
}
async function pickCatalog(k){
  const ctx=catPickCtx; if(!ctx)return;
  const e=ctx.e, v=(k>=0?ctx.variants[k]:{color:"",image:"",images:[],title:"",details:""});
  const base={brand:e.brand||"",name:e.name||"",year:e.year||""};
  const vImgs=(Array.isArray(v.images)&&v.images.length)?v.images.slice():(v.image?[v.image]:[]);  // TODAS las fotos de la versión
  const spec = vImgs.length? {id:uid(),title:v.title||"",details:v.details||"",color:v.color||"",images:vImgs} : null;
  const newCar = {id:uid(),created:Date.now(),...base,image:vImgs[0]||"",color:v.color||"",price:null,currency:"USD",notes:"",ratings:{},specs:spec?[spec]:[],tags:[]};
  const addVariant=(ex)=>{ ex.specs=ex.specs||[]; const key0=vImgs[0]; if(key0 && !ex.specs.some(s=>(s.images||[]).includes(key0))){ ex.specs.push({id:uid(),title:v.title||"",details:v.details||"",color:v.color||"",images:vImgs.slice()}); return true; } return false; };
  if(readOnly){
    const mine=await fetchMyGarageBlob(); if(!mine){toast("Error");return;}
    const ex=mine.cars.find(c=>sameCar(c,base));
    if(ex){ toast(addVariant(ex)?("Versión añadida a tu "+(e.name||"coche")):"Ya tienes esa versión"); }
    else { mine.cars.push(newCar); toast("✓ Añadido a tu garage"); }
    await saveMyGarageBlob(mine);
  } else {
    const ex=cars.find(c=>sameCar(c,base));
    if(ex){ toast(addVariant(ex)?("Versión añadida a tu "+(e.name||"coche")):"Ya tienes esa versión"); }

let battlePick=[null,null], battleSide=0, btSpecs=[], btAll=null, btTimer=null;
let battleWins={}, battleBusy=false;
function specKey(s){ return s?((s.brand||"")+"|"+(s.name||"")+"|"+(s.year||"")+"|"+(s.color||"")+"|"+(s.title||"")).toLowerCase():""; }
// aplanar TODO el catálogo a specs individuales (uno por versión/color)
async function battleLoadAllSpecs(){
  if(btAll) return btAll;
  let rows=[];
  try{ const {data}=await supa.from("catalog").select("key,brand,name,year,image,variants,added_by").order("created_at",{ascending:false}).limit(60); rows=data||[]; }catch(e){}
  const specs=[];
  rows.forEach(e=>{
    const vars=catVariants(e);
    if(vars.length){
      vars.forEach((v,vi)=>{ specs.push({key:e.key,brand:e.brand||"",name:e.name||"",year:e.year||"",added_by:e.added_by,
        color:v.color||"",title:v.title||"",image:v.image||(v.images&&v.images[0])||"",
        images:(v.images&&v.images.length?v.images.slice():(v.image?[v.image]:[])),vi}); });
    } else if(e.image){
      specs.push({key:e.key,brand:e.brand||"",name:e.name||"",year:e.year||"",added_by:e.added_by,color:"",title:"",image:e.image,images:[e.image],vi:0});
    }
  });
  btAll=specs; return specs;
}
// trae TODAS las fotos reales de ESE spec (del garage de quien lo publicó)
async function battleLoadSpec(item){
  let images=(item.images||[]).slice(), price=null, currency="USD";
  try{
    if(item.added_by){
      const {data:g}=await supa.from("garages").select("data").eq("user_id",item.added_by).maybeSingle();
      const cars=(g&&g.data&&Array.isArray(g.data.cars))?g.data.cars:null;
      if(cars){
        const norm=s=>(s||"").toLowerCase().trim();
        const src=cars.find(x=>norm(x.brand)===norm(item.brand)&&norm(x.name)===norm(item.name));
        if(src){
          price=(src.price??null); currency=src.currency||"USD";
          const sp=(Array.isArray(src.specs)?src.specs:[]);
          let m=sp.find(s=>norm(s.color)===norm(item.color)&&norm(s.title)===norm(item.title))
             || sp.find(s=>(s.images||[]).includes(item.image)) || sp[item.vi];
          if(m && (m.images||[]).filter(Boolean).length) images=(m.images||[]).filter(Boolean);
        }
      }
    }
  }catch(e){}
  return {brand:item.brand,name:item.name,year:item.year,color:item.color,title:item.title,price,currency,images};
}
function battleColumn(side){
  const s=battlePick[side], tag=side===0?"A":"B";

  return `<div class="battlecar">
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:10px">

          <div style="font-family:var(--display);font-size:23px;line-height:.95">${esc(s.year||"")} <span style="color:var(--accent)">${esc(s.brand||"")}</span></div></div>

        ${(s.color||s.title)?`<div style="margin-top:5px">${s.color?`<span class="tag">🎨 ${esc(s.color)}</span> `:""}${s.title?`<span class="tag">${esc(s.title)}</span>`:""}</div>`:""}
        ${priceStr?`<div style="font-size:14px;color:var(--ink-dim);margin-top:4px">${priceStr}</div>`:""}
        <div style="font-size:12px;color:var(--ink-faint);margin-top:2px">${s.images.length} foto(s)</div>
        ${(battleWins[specKey(s)]||0)?`<div style="font-size:12px;color:var(--accent);font-weight:700;margin-top:2px">🏆 ${battleWins[specKey(s)]} victoria(s)</div>`:""}

    </div>
    ${s.images.length?`<div class="gallery">${s.images.map((im,idx)=>`<img src="${esc(im)}" style="cursor:pointer" onclick="battleBig(${side},${idx})">`).join("")}</div>`:'<span style="color:var(--ink-faint)">Sin fotos</span>'}
  </div>`;

function renderBattle(){
  const v=$("#tab-battle"); if(!v)return;
  const both=battlePick[0]&&battlePick[1];
  v.innerHTML=`<div class="panel">
    <h3>⚔️ Spec Battle</h3>
    <p class="lead">Elige dos specs (o sortéalos), compara sus fotos y elige al ganador. El campeón se queda y entra un retador nuevo.</p>
    <div style="text-align:center;margin-bottom:14px">
      <button class="btn primary" onclick="battleRandom()" ${battleBusy?'disabled':''}>🎲 Batalla aleatoria</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start">
      <div>${battleColumn(0)}</div>
      <div class="vsmid" style="align-self:center;position:static">VS</div>
      <div>${battleColumn(1)}</div>
    </div>
    ${both?`<div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
        <button class="btn primary" onclick="battleWinner(0)">🏆 Gana A</button>
        <button class="btn primary" onclick="battleWinner(1)">🏆 Gana B</button>
      </div>`:""}
    ${(battlePick[0]||battlePick[1])?`<div style="text-align:center;margin-top:12px"><button class="btn ghost sm" onclick="battlePick=[null,null];renderBattle()">Limpiar</button></div>`:""}
  </div>`;
}
async function randomSpecItem(exclude){
  const all=await battleLoadAllSpecs();
  const pool=all.filter(s=>!(exclude||[]).includes(specKey(s)));
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
async function battleRandom(){
  if(battleBusy)return; battleBusy=true; toast("🎲 Sorteando duelo…"); renderBattle();
  try{
    const a=await randomSpecItem([]);
    if(!a){ toast("No hay specs en el catálogo"); battleBusy=false; renderBattle(); return; }
    const b=await randomSpecItem([specKey(a)]);
    battlePick[0]=await battleLoadSpec(a);
    battlePick[1]=b?await battleLoadSpec(b):null;
  }catch(e){ toast("No se pudo sortear"); }
  battleBusy=false; renderBattle();
}
async function battleRandomOne(side){
  if(battleBusy)return;
  const other=battlePick[side===0?1:0];
  toast("🎲 Sorteando…");
  const item=await randomSpecItem(other?[specKey(other)]:[]);
  if(!item){ toast("No hay specs en el catálogo"); return; }
  battlePick[side]=await battleLoadSpec(item);
  renderBattle();
}
async function battleWinner(side){
  const w=battlePick[side]; if(!w)return;
  battleWins[specKey(w)]=(battleWins[specKey(w)]||0)+1;
  // rey de la colina: el ganador pasa al lado A y entra un retador nuevo en B
  battlePick[0]=w; battlePick[1]=null;
  toast("🏆 Ganó "+(w.brand||"")+" "+(w.name||""));
  renderBattle();
  battleBusy=true; renderBattle();
  try{ const ch=await randomSpecItem([specKey(w)]); if(ch) battlePick[1]=await battleLoadSpec(ch); }catch(e){}
  battleBusy=false; renderBattle();
}
function battleBig(side,idx){
  const s=battlePick[side]; if(!s)return; const im=s.images[idx]; if(!im)return;

function battleSearch(q){

    const all=await battleLoadAllSpecs();

      </div>
    </div>`).join("");
  },200);
}

function renderStoryThumbs(){ const b=$("#sf-thumbs"); if(!b)return; b.innerHTML=storyImgs.map((im,i)=>`<span style="position:relative;display:inline-block;margin-right:4px"><img src="${im}" style="width:54px;height:54px;object-fit:cover;border-radius:7px;border:1px solid var(--line)"><button type="button" onclick="storyImgs.splice(${i},1);renderStoryThumbs()" style="position:absolute;top:-6px;right:-6px;background:var(--accent);color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px">×</button></span>`).join(""); }
async function saveStory(){
  const title=$("#sf-title").value.trim(), body=$("#sf-body").value.trim(), car=$("#sf-car").value.trim(), msg=$("#sf-msg");
  if(!title&&!body){ msg.textContent="Escribe al menos un título o la historia."; return; }
  msg.textContent="Publicando…";
  try{
    const {error}=await supa.from("stories").insert({user_id:session.user.id, username:(myProfile?myProfile.username:""), title, body, car, images:storyImgs});
    if(error){ msg.textContent="⚠ "+error.message; return; }
    storyImgs=[]; closeAll(); toast("✓ Historia publicada"); renderHistoria();
  }catch(e){ msg.textContent="⚠ Error de conexión."; }
}
async function delStory(id){ if(!confirm("¿Eliminar tu historia?"))return; try{ await supa.from("stories").delete().eq("id",id); renderHistoria(); }catch(e){} }

function openHomeCar(i){ if(!homeCars[i])return; mkData=homeCars.slice(); addFromCatalog(i); }

/* ======================================================================
   HERO — rota entre varias fotos con crossfade
   ====================================================================== */
let heroTimer=null;
function stopHeroRotator(){ if(heroTimer){ clearInterval(heroTimer); heroTimer=null; } }
function startHeroRotator(){
  stopHeroRotator();
  const bg=$("#heroBg"); if(!bg)return;
  const slides=bg.querySelectorAll(".hero-slide"); if(slides.length<2)return;
  let i=0;
  heroTimer=setInterval(()=>{
    slides[i].classList.remove("on");
    i=(i+1)%slides.length;
    slides[i].classList.add("on");
  },5000);
}
/* ======================================================================
   HISTORIAS — slideshow grande en Inicio
   ====================================================================== */
let storyShowIdx=0, storyShowTimer=null;
function stopStoryTimer(){ if(storyShowTimer){ clearInterval(storyShowTimer); storyShowTimer=null; } }
function restartStoryTimer(){ stopStoryTimer(); if((homeStories||[]).length>1) storyShowTimer=setInterval(()=>{ storyShowIdx++; renderStoryShow(); },6500); }
function renderStoryShow(){
  const box=$("#home-stories"); if(!box)return;
  const arr=homeStories||[];
  if(!arr.length){ box.innerHTML='<p style="color:var(--ink-faint);font-size:13px">Aún no hay historias. ¡Escribe la primera!</p>'; return; }
  if(storyShowIdx>=arr.length)storyShowIdx=0; if(storyShowIdx<0)storyShowIdx=arr.length-1;
  const s=arr[storyShowIdx];
  const cover=(s.images&&s.images[0])||"";
  const d=s.created_at?new Date(s.created_at).toLocaleDateString():"";
  const multi=arr.length>1;
  box.innerHTML=`<div class="story-show">
    <div class="ss-slide" ${cover?`style="background-image:url('${esc(cover)}')"`:''} onclick="openStoryView('${s.id}')">
      ${cover?'':'<div class="ss-noimg">📖</div>'}
      <div class="ss-grad"></div>
      ${multi?`<button class="ss-arrow l" onclick="event.stopPropagation();storyShowNav(-1)" aria-label="Anterior">‹</button>
               <button class="ss-arrow r" onclick="event.stopPropagation();storyShowNav(1)" aria-label="Siguiente">›</button>`:''}
      <div class="ss-content">
        <div class="ss-meta">por @${esc(s.username||"anónimo")}${d?` · ${d}`:""}${s.car?` · ${esc(s.car)}`:""}</div>
        <div class="ss-title">${esc(s.title||"Sin título")}</div>
        ${s.body?`<div class="ss-ex">${esc(s.body)}</div>`:''}

      </div>
    </div>
    ${multi?`<div class="ss-dots">${arr.map((_,i)=>`<button class="ss-dot${i===storyShowIdx?' on':''}" onclick="storyShowGo(${i})" aria-label="Historia ${i+1}"></button>`).join("")}</div>`:''}
  </div>`;
}
function storyShowNav(dir){ storyShowIdx+=dir; renderStoryShow(); restartStoryTimer(); }
function storyShowGo(i){ storyShowIdx=i; renderStoryShow(); restartStoryTimer(); }

<script>
/* ---- PWA: service worker + sugerencia de instalación ---- */
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
let deferredPrompt=null;
function pwaStandalone(){ return window.matchMedia("(display-mode: standalone)").matches || navigator.standalone; }
function showInstall(kind){
  const bar=document.getElementById("pwaBar"); if(!bar) return;
  if(pwaStandalone()) return;
  try{ if(localStorage.getItem("pwaHide")) return; }catch(e){}
  if(kind==="android"){
    bar.innerHTML='<span>📲 Instala <b>Mi Garage</b> en tu pantalla</span><button class="btn primary sm" id="pwaInstall">Instalar</button><button class="btn sm ghost" id="pwaClose">×</button>';
  }else{
    bar.innerHTML='<span>📲 Instálala: toca <b>Compartir</b> y “<b>Agregar a inicio</b>”</span><button class="btn sm ghost" id="pwaClose">×</button>';
  }
  bar.style.display="flex";
  const ib=document.getElementById("pwaInstall");
  if(ib) ib.onclick=async()=>{ if(deferredPrompt){ deferredPrompt.prompt(); try{await deferredPrompt.userChoice;}catch(e){} deferredPrompt=null; } bar.style.display="none"; };
  const cb=document.getElementById("pwaClose");
  if(cb) cb.onclick=()=>{ bar.style.display="none"; try{localStorage.setItem("pwaHide","1");}catch(e){} };
}
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; showInstall("android"); });
(function(){ const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent); if(isIOS && !pwaStandalone()){ setTimeout(()=>showInstall("ios"),2500); } })();
</script>
